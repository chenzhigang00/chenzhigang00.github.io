<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Tester - Static Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #475569;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 80px);
        }

        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .environment-selector {
            width: 100%;
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            font-weight: 600;
        }

        .sidebar-tab:hover {
            background: var(--bg-hover);
        }

        .sidebar-tab.active {
            background: var(--primary-color);
            color: white;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .request-builder {
            padding: 25px;
            border-bottom: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .url-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .method-select {
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            min-width: 100px;
        }

        .url-input {
            flex: 1;
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .url-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .send-btn {
            padding: 12px 30px;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tab:hover {
            color: var(--primary-color);
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        textarea.form-control {
            min-height: 200px;
            resize: vertical;
            font-family: 'Fira Code', 'Consolas', monospace;
            line-height: 1.6;
        }

        .key-value-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .key-value-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: center;
        }

        .key-value-row input {
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: var(--bg-hover);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: var(--error-color);
            color: white;
        }

        .response-panel {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: var(--bg-dark);
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .response-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-code {
            font-size: 2em;
            font-weight: 700;
        }

        .status-success { color: var(--success-color); }
        .status-error { color: var(--error-color); }
        .status-warning { color: var(--warning-color); }

        .response-meta {
            display: flex;
            gap: 20px;
        }

        .meta-item {
            text-align: center;
        }

        .meta-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .meta-value {
            font-size: 1.2em;
            font-weight: 600;
        }

        .code-block {
            background: #0d1117;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
        }

        .code-title {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .code-block pre {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
            max-height: 400px;
        }

        .code-block code {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e6edf3;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            font-size: 1.5em;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5em;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: var(--success-color);
            color: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: var(--error-color);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .collection-item {
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .collection-header {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .collection-header:hover {
            background: var(--bg-hover);
        }

        .collection-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .collection-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .collection-header:hover .collection-actions {
            opacity: 1;
        }

        .collection-requests {
            padding: 0 15px 15px;
        }

        .request-item {
            padding: 10px;
            margin: 5px 0;
            background: var(--bg-card);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 13px;
        }

        .request-item:hover {
            background: var(--bg-hover);
            transform: translateX(5px);
        }

        .method-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .method-get { background: var(--success-color); }
        .method-post { background: var(--primary-color); }
        .method-put { background: var(--warning-color); }
        .method-patch { background: #8b5cf6; }
        .method-delete { background: var(--error-color); }

        .history-item {
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .history-item:hover {
            background: var(--bg-hover);
        }

        .history-info {
            flex: 1;
        }

        .history-url {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--bg-hover);
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><i class="fas fa-rocket"></i> API Tester</h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="clearHistory()">
                <i class="fas fa-trash"></i> Clear History
            </button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-tabs">
                <div class="sidebar-tab active" onclick="switchSidebarTab('history')">
                    <i class="fas fa-history"></i> History
                </div>
            </div>
            <div class="sidebar-content" id="sidebarContent">
                <!-- Content loaded dynamically -->
            </div>
        </aside>

        <main class="main-content">
            <div class="request-builder">
                <div class="url-bar">
                    <select class="method-select" id="method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="PATCH">PATCH</option>
                        <option value="DELETE">DELETE</option>
                        <option value="HEAD">HEAD</option>
                        <option value="OPTIONS">OPTIONS</option>
                    </select>
                    <input type="text" class="url-input" id="url" placeholder="Enter request URL (e.g., https://api.example.com/users)">
                    <button class="btn btn-primary send-btn" onclick="sendRequest()">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>

                <div class="tabs">
                    <div class="tab active" onclick="switchTab('params')">Params</div>
                    <div class="tab" onclick="switchTab('headers')">Headers</div>
                    <div class="tab" onclick="switchTab('body')">Body</div>
                </div>

                <div id="params-tab" class="tab-content active">
                    <div class="key-value-list" id="paramsList">
                        <div class="key-value-row">
                            <input type="text" placeholder="Key" class="param-key">
                            <input type="text" placeholder="Value" class="param-value">
                            <button class="btn-icon" onclick="removeRow(this)"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <button class="btn btn-secondary" style="margin-top: 15px;" onclick="addParamRow()">
                        <i class="fas fa-plus"></i> Add Param
                    </button>
                </div>

                <div id="headers-tab" class="tab-content">
                    <div class="key-value-list" id="headersList">
                        <div class="key-value-row">
                            <input type="text" placeholder="Key" class="header-key">
                            <input type="text" placeholder="Value" class="header-value">
                            <button class="btn-icon" onclick="removeRow(this)"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <button class="btn btn-secondary" style="margin-top: 15px;" onclick="addHeaderRow()">
                        <i class="fas fa-plus"></i> Add Header
                    </button>
                </div>

                <div id="body-tab" class="tab-content">
                    <div class="form-group">
                        <label>Request Body</label>
                        <textarea class="form-control" id="requestBody" placeholder="{
  &quot;key&quot;: &quot;value&quot;
}"></textarea>
                    </div>
                </div>
            </div>

            <div class="response-panel" id="responsePanel">
                <div class="empty-state">
                    <i class="fas fa-paper-plane"></i>
                    <h3>Send a request to see the response</h3>
                    <p>Enter a URL and click Send to get started</p>
                </div>
            </div>
        </main>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Sending request...</p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Static API Tester - Client Side Only
        // Uses localStorage for persistence and browser fetch API

        const STORAGE_KEY = 'api_tester_history';
        let requestHistory = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            renderSidebar();
        });

        // Load history from localStorage
        function loadHistory() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    requestHistory = JSON.parse(stored);
                }
            } catch (error) {
                console.error('Error loading history:', error);
                requestHistory = [];
            }
        }

        // Save history to localStorage
        function saveHistory() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(requestHistory));
            } catch (error) {
                console.error('Error saving history:', error);
            }
        }

        // Tab Switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        function switchSidebarTab(tabName) {
            document.querySelectorAll('.sidebar-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderSidebar();
        }

        // Render Sidebar with History
        function renderSidebar() {
            const sidebarContent = document.getElementById('sidebarContent');
            
            if (requestHistory.length === 0) {
                sidebarContent.innerHTML = '<div class="empty-state"><p>No history yet</p></div>';
                return;
            }
            
            sidebarContent.innerHTML = '<div class="history-list">' + 
                requestHistory.map((item, index) => `
                    <div class="history-item" onclick="loadFromHistory(${index})">
                        <span class="method-badge method-${item.method.toLowerCase()}">${item.method}</span>
                        <div class="history-info">
                            <div>${item.url}</div>
                            <div class="history-url">${item.status_code || 'N/A'} | ${item.response_time || 0}ms | ${new Date(item.timestamp).toLocaleTimeString()}</div>
                        </div>
                    </div>
                `).join('') + 
            '</div>';
        }

        // Send Request using browser fetch API
        async function sendRequest() {
            const method = document.getElementById('method').value;
            let url = document.getElementById('url').value;
            const body = document.getElementById('requestBody').value;
            
            if (!url) {
                showToast('Please enter a URL', 'error');
                return;
            }

            // Add protocol if missing
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            
            // Collect headers
            const headers = {};
            document.querySelectorAll('.header-key').forEach((keyInput, index) => {
                const valueInput = document.querySelectorAll('.header-value')[index];
                if (keyInput.value && valueInput.value) {
                    headers[keyInput.value] = valueInput.value;
                }
            });
            
            // Collect query params
            const queryParams = {};
            document.querySelectorAll('.param-key').forEach((keyInput, index) => {
                const valueInput = document.querySelectorAll('.param-value')[index];
                if (keyInput.value && valueInput.value) {
                    queryParams[keyInput.value] = valueInput.value;
                }
            });
            
            // Add query params to URL
            if (Object.keys(queryParams).length > 0) {
                const urlObj = new URL(url);
                Object.entries(queryParams).forEach(([key, value]) => {
                    urlObj.searchParams.append(key, value);
                });
                url = urlObj.toString();
            }
            
            const startTime = performance.now();
            
            try {
                const fetchOptions = {
                    method: method,
                    headers: headers
                };
                
                // Add body for POST, PUT, PATCH
                if (body && ['POST', 'PUT', 'PATCH'].includes(method)) {
                    fetchOptions.body = body;
                    // Auto-set Content-Type if not provided
                    if (!headers['Content-Type'] && !headers['content-type']) {
                        try {
                            JSON.parse(body);
                            fetchOptions.headers['Content-Type'] = 'application/json';
                        } catch (e) {
                            // Not JSON, leave as is
                        }
                    }
                }
                
                const response = await fetch(url, fetchOptions);
                
                const endTime = performance.now();
                const responseTime = Math.round(endTime - startTime);
                
                // Get response body
                let responseBody;
                const contentType = response.headers.get('content-type') || '';
                
                if (contentType.includes('application/json')) {
                    responseBody = await response.json();
                } else {
                    responseBody = await response.text();
                }
                
                // Prepare response data
                const responseData = {
                    status_code: response.status,
                    status_text: response.statusText,
                    headers: Object.fromEntries(response.headers.entries()),
                    body: typeof responseBody === 'object' ? JSON.stringify(responseBody, null, 2) : responseBody,
                    json: typeof responseBody === 'object' ? responseBody : null,
                    response_time: responseTime,
                    timestamp: new Date().toISOString(),
                    size: new Blob([typeof responseBody === 'object' ? JSON.stringify(responseBody) : responseBody]).size
                };
                
                // Add to history
                const historyEntry = {
                    method: method,
                    url: url,
                    timestamp: new Date().toISOString(),
                    status_code: response.status,
                    response_time: responseTime
                };
                requestHistory.unshift(historyEntry);
                
                // Keep only last 50 requests
                if (requestHistory.length > 50) {
                    requestHistory.pop();
                }
                
                saveHistory();
                renderSidebar();
                displayResponse(responseData);
                
            } catch (error) {
                displayError(error.message);
            } finally {
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        // Display Response
        function displayResponse(data) {
            const panel = document.getElementById('responsePanel');
            
            if (data.error) {
                displayError(data.error);
                return;
            }
            
            const statusClass = data.status_code >= 200 && data.status_code < 300 ? 'status-success' :
                               data.status_code >= 400 ? 'status-error' : 'status-warning';
            
            let bodyContent = '';
            if (data.json) {
                bodyContent = JSON.stringify(data.json, null, 2);
            } else {
                bodyContent = data.body || 'No response body';
            }
            
            panel.innerHTML = `
                <div class="response-header">
                    <div class="response-status">
                        <span class="status-code ${statusClass}">${data.status_code}</span>
                        <span>${data.status_text || ''}</span>
                    </div>
                    <div class="response-meta">
                        <div class="meta-item">
                            <div class="meta-label">Time</div>
                            <div class="meta-value">${data.response_time}ms</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Size</div>
                            <div class="meta-value">${formatBytes(data.size)}</div>
                        </div>
                    </div>
                </div>
                
                <div class="code-block">
                    <div class="code-header">
                        <span class="code-title">Response Body</span>
                        <button class="btn btn-secondary" onclick="copyResponse()">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                    <pre><code id="responseBody">${escapeHtml(bodyContent)}</code></pre>
                </div>
            `;
        }

        function displayError(error) {
            const panel = document.getElementById('responsePanel');
            panel.innerHTML = `
                <div class="response-header">
                    <div class="response-status">
                        <span class="status-code status-error">Error</span>
                    </div>
                </div>
                <div class="code-block">
                    <div class="code-header">
                        <span class="code-title">Error Details</span>
                    </div>
                    <pre><code>${escapeHtml(error)}</code></pre>
                </div>
            `;
        }

        // Load from History
        function loadFromHistory(index) {
            const item = requestHistory[index];
            if (!item) return;
            
            document.getElementById('method').value = item.method;
            document.getElementById('url').value = item.url;
            showToast('Request loaded from history');
        }

        // Clear History
        function clearHistory() {
            if (!confirm('Are you sure you want to clear all history?')) {
                return;
            }
            
            requestHistory = [];
            saveHistory();
            renderSidebar();
            showToast('History cleared!');
        }

        // Helper Functions
        function addParamRow() {
            const list = document.getElementById('paramsList');
            const row = document.createElement('div');
            row.className = 'key-value-row';
            row.innerHTML = `
                <input type="text" placeholder="Key" class="param-key">
                <input type="text" placeholder="Value" class="param-value">
                <button class="btn-icon" onclick="removeRow(this)"><i class="fas fa-times"></i></button>
            `;
            list.appendChild(row);
        }

        function addHeaderRow() {
            const list = document.getElementById('headersList');
            const row = document.createElement('div');
            row.className = 'key-value-row';
            row.innerHTML = `
                <input type="text" placeholder="Key" class="header-key">
                <input type="text" placeholder="Value" class="header-value">
                <button class="btn-icon" onclick="removeRow(this)"><i class="fas fa-times"></i></button>
            `;
            list.appendChild(row);
        }

        function removeRow(btn) {
            btn.parentElement.remove();
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type === 'error' ? 'error' : '');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function copyResponse() {
            const code = document.getElementById('responseBody').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast('Response copied!');
            });
        }
    </script>
</body>
</html>
